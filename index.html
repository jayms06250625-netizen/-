<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Index</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --color-primary:#0066cc;
  --color-primary-focus:#0071e3;
  --color-primary-on-dark:#2997ff;
  --color-ink:#1d1d1f;
  --color-body-muted:#cccccc;
  --color-hairline:#e0e0e0;
  --color-surface-tile-1:#272729;
  --color-surface-black:#000000;
  --radius-lg:18px;
  --radius-pill:9999px;
  --shadow-product:3px 5px 30px 0 rgba(0,0,0,0.22);
  --font-display:'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
  --font-text:'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  font-family:var(--font-text);
  background:var(--color-surface-tile-1);
  color:#fff;
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:64px 24px;
  -webkit-font-smoothing:antialiased;
}
.global-nav{
  position:fixed; top:0; left:0; right:0; height:44px;
  background:var(--color-surface-black); color:#fff;
  display:flex; align-items:center; padding:0 24px;
  font-family:var(--font-display); font-weight:600; font-size:15px; letter-spacing:-0.2px;
}
h1{ font-family:var(--font-display); font-size:40px; font-weight:600; letter-spacing:0; text-align:center; }
p.lead{ font-family:var(--font-display); font-size:21px; font-weight:400; color:var(--color-body-muted); margin-top:12px; text-align:center; max-width:480px; }
.card-row{ display:flex; gap:20px; margin-top:48px; flex-wrap:wrap; justify-content:center; }
.card{
  width:260px; background:#2a2a2c; border-radius:var(--radius-lg);
  padding:32px 24px; text-align:center; box-shadow:var(--shadow-product);
  transition:transform .15s ease;
}
.card:hover{ transform:translateY(-4px); }
.card h2{ font-family:var(--font-display); font-size:22px; font-weight:600; margin-bottom:8px; }
.card p{ color:var(--color-body-muted); font-size:15px; line-height:1.5; margin-bottom:20px; }
.card a{
  display:inline-flex; align-items:center; justify-content:center;
  background:var(--color-primary); color:#fff; text-decoration:none;
  border-radius:var(--radius-pill); padding:10px 22px; font-size:15px;
  transition:background .15s ease, transform .12s ease;
}
.card a:hover{ background:var(--color-primary-focus); }
.card a:active{ transform:scale(0.95); }
footer{ margin-top:64px; color:#7a7a7d; font-size:12px; text-align:center; }
</style>
</head>
<body>
<nav class="global-nav">site</nav>
<h1>디자인 시스템 데모</h1>
<p class="lead">Apple 스타일 디자인 토큰으로 만든 두 개의 페이지입니다.</p>
<div class="card-row">
  <div class="card">
    <h2>Orbit</h2>
    <p>라이트/다크 타일이 반복되는 제품 홈페이지</p>
    <a href="orbit/">둘러보기</a>
  </div>
  <div class="card">
    <h2>Lotto Draw</h2>
    <p>애니메이션으로 번호를 뽑는 추첨기</p>
    <a href="lotto/">추첨하기</a>
  </div>
</div>
<footer>Copyright © 2026</footer>
</body>
</html>
